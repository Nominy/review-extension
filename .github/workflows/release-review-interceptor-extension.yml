name: Release Review Interceptor Extension

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: review-interceptor-extension-release
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Validate extension
        run: |
          npm run typecheck
          npm test

      - name: Build release ZIP
        run: npm run build:zip

      - name: Capture release metadata
        id: metadata
        run: |
          VERSION=$(node --input-type=module -e "import fs from 'node:fs'; const manifest = JSON.parse(fs.readFileSync('manifest.json', 'utf8')); process.stdout.write(manifest.version);")
          ZIP_PATH="${GITHUB_WORKSPACE}/.artifacts/babel-review-helper-${VERSION}.zip"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "zip_path=${ZIP_PATH}" >> "$GITHUB_OUTPUT"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: babel-review-helper-${{ steps.metadata.outputs.version }}
          path: ${{ steps.metadata.outputs.zip_path }}
          if-no-files-found: error

      - name: Resolve release target
        id: release_target
        run: |
          echo "target_sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Publish GitHub Release asset
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: v${{ steps.metadata.outputs.version }}
          ZIP_PATH: ${{ steps.metadata.outputs.zip_path }}
          TARGET_SHA: ${{ steps.release_target.outputs.target_sha }}
        run: |
          if gh release view "$TAG_NAME" --repo "$GITHUB_REPOSITORY" > /dev/null 2>&1; then
            gh release upload "$TAG_NAME" "$ZIP_PATH" --repo "$GITHUB_REPOSITORY" --clobber
          else
            gh release create "$TAG_NAME" "$ZIP_PATH" \
              --repo "$GITHUB_REPOSITORY" \
              --target "$TARGET_SHA" \
              --title "$TAG_NAME" \
              --generate-notes
          fi
