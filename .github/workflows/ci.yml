name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - dev

permissions:
  contents: read

concurrency:
  group: review-extension-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Check out shared extension platform
        run: |
          mkdir -p ../../shared
          git clone --depth 1 https://github.com/Nominy/babel-extension-platform.git ../../shared/babel-extension-platform

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Validate
        run: |
          npm run typecheck
          npm test
          npm run build
