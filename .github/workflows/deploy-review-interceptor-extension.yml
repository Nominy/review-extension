name: Deploy Review Interceptor Extension

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      publish_type:
        description: Chrome Web Store publish mode
        type: choice
        options:
          - DEFAULT_PUBLISH
          - STAGED_PUBLISH
        default: DEFAULT_PUBLISH
      skip_review:
        description: Request skipReview=true when the item is eligible
        type: boolean
        default: false

permissions:
  contents: write

concurrency:
  group: review-interceptor-extension-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check out shared extension platform
        run: |
          mkdir -p ../../shared
          git clone --depth 1 https://github.com/Nominy/babel-extension-platform.git ../../shared/babel-extension-platform

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install shared platform dependencies
        working-directory: ../../shared/babel-extension-platform
        run: npm ci

      - name: Install dependencies
        run: npm ci

      - name: Validate extension
        run: |
          npm run typecheck
          npm test

      - name: Build release ZIP
        env:
          BABEL_EXTENSION_ZIP_DIR: ${{ github.workspace }}/.artifacts
          RELEASE_PATCH: ${{ github.run_number }}
        run: |
          node --input-type=module <<'NODE'
          import fs from 'node:fs';

          const files = ['package.json', 'package-lock.json', 'manifest.json'];
          const packageJson = JSON.parse(fs.readFileSync('package.json', 'utf8'));
          const [major, minor, patch] = packageJson.version.split('.').map(Number);
          const nextPatch = Math.max(patch + 1, Number(process.env.RELEASE_PATCH || 0));
          const nextVersion = `${major}.${minor}.${nextPatch}`;

          for (const file of files) {
            const json = JSON.parse(fs.readFileSync(file, 'utf8'));
            json.version = nextVersion;
            if (json.packages?.['']) {
              json.packages[''].version = nextVersion;
            }
            fs.writeFileSync(file, `${JSON.stringify(json, null, 2)}\n`);
          }

          console.log(`Release version: ${packageJson.version} -> ${nextVersion}`);
          NODE
          npm run build:release
          npm run build:zip -- --no-build --flavor release

      - name: Capture release metadata
        id: metadata
        run: |
          VERSION=$(node --input-type=module -e "import fs from 'node:fs'; const manifest = JSON.parse(fs.readFileSync('manifest.json', 'utf8')); process.stdout.write(manifest.version);")
          ZIP_PATH="${GITHUB_WORKSPACE}/.artifacts/babel-review-helper-${VERSION}.zip"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "zip_path=${ZIP_PATH}" >> "$GITHUB_OUTPUT"

      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: babel-review-helper-${{ steps.metadata.outputs.version }}
          path: ${{ steps.metadata.outputs.zip_path }}
          if-no-files-found: error

      - name: Publish to Chrome Web Store
        env:
          CWS_CLIENT_ID: ${{ secrets.CWS_CLIENT_ID }}
          CWS_CLIENT_SECRET: ${{ secrets.CWS_CLIENT_SECRET }}
          CWS_REFRESH_TOKEN: ${{ secrets.CWS_REFRESH_TOKEN }}
          CWS_ACCESS_TOKEN: ${{ secrets.CWS_ACCESS_TOKEN }}
          CWS_PUBLISHER_ID: ${{ secrets.CWS_PUBLISHER_ID }}
          CWS_EXTENSION_ID: ${{ secrets.CWS_EXTENSION_ID }}
          CWS_PUBLISH_TYPE: ${{ inputs.publish_type || 'DEFAULT_PUBLISH' }}
          CWS_SKIP_REVIEW: ${{ inputs.skip_review || 'false' }}
          CWS_ZIP_PATH: ${{ steps.metadata.outputs.zip_path }}
        run: node scripts/publish-cws.mjs

      - name: Resolve release target
        id: release_target
        run: |
          echo "target_sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Publish GitHub Release asset
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: v${{ steps.metadata.outputs.version }}
          ZIP_PATH: ${{ steps.metadata.outputs.zip_path }}
          TARGET_SHA: ${{ steps.release_target.outputs.target_sha }}
        run: |
          if gh release view "$TAG_NAME" --repo "$GITHUB_REPOSITORY" > /dev/null 2>&1; then
            gh release upload "$TAG_NAME" "$ZIP_PATH" --repo "$GITHUB_REPOSITORY" --clobber
          else
            gh release create "$TAG_NAME" "$ZIP_PATH" \
              --repo "$GITHUB_REPOSITORY" \
              --target "$TARGET_SHA" \
              --title "$TAG_NAME" \
              --generate-notes
          fi
