<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Babel Review Settings</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f8fafc;
        --surface: #ffffff;
        --ink: #0f172a;
        --muted: #64748b;
        --faint: #94a3b8;
        --line: rgba(226, 232, 240, 0.85);
        --accent: #4f46e5;
        --accent-soft: rgba(99, 102, 241, 0.08);
        --danger: #dc2626;
        --font: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      }

      * { box-sizing: border-box; margin: 0; }
      body {
        font: 14px/1.55 var(--font);
        color: var(--ink);
        background: linear-gradient(180deg, #eef2ff 0%, var(--bg) 60%);
        min-height: 100vh;
      }

      main {
        max-width: 560px;
        margin: 0 auto;
        padding: 40px 20px 56px;
      }

      .card {
        background: var(--surface);
        border: 1px solid var(--line);
        border-radius: 20px;
        padding: 28px;
        box-shadow: 0 20px 60px -12px rgba(15, 23, 42, 0.12), 0 8px 20px -8px rgba(15, 23, 42, 0.06);
        position: relative;
        overflow: hidden;
        animation: fade-up 300ms cubic-bezier(0.16, 1, 0.3, 1) both;
      }
      .card::before {
        content: '';
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        height: 3px;
        background: linear-gradient(90deg, #6366f1, #8b5cf6, #a78bfa, transparent);
        opacity: 0.6;
      }

      .card-header {
        display: flex;
        align-items: flex-start;
        gap: 12px;
        margin-bottom: 16px;
      }
      .card-icon {
        font-size: 28px;
        line-height: 1;
        filter: drop-shadow(0 1px 2px rgba(99, 102, 241, 0.2));
      }
      h1 {
        font-size: 22px;
        font-weight: 700;
        letter-spacing: -0.02em;
        background: linear-gradient(135deg, #1e293b, #334155);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }
      .card-desc {
        color: var(--muted);
        font-size: 13px;
        margin-top: 2px;
        line-height: 1.5;
      }

      .field-group {
        margin-top: 20px;
      }
      label {
        display: block;
        font-size: 11px;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.06em;
        color: var(--faint);
        margin-bottom: 6px;
      }

      input, select, textarea {
        width: 100%;
        border: 1px solid rgba(203, 213, 225, 0.8);
        border-radius: 10px;
        padding: 10px 13px;
        font: inherit;
        font-size: 13px;
        color: var(--ink);
        background: var(--surface);
        transition: border-color 180ms ease, box-shadow 180ms ease;
      }
      input:focus, select:focus, textarea:focus {
        outline: none;
        border-color: rgba(99, 102, 241, 0.5);
        box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.08);
      }
      textarea {
        min-height: 100px;
        resize: vertical;
      }
      textarea::placeholder { color: #cbd5e1; }
      select {
        cursor: pointer;
        appearance: none;
        background-image: url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' fill='none' viewBox='0 0 20 20'%3e%3cpath stroke='%2394a3b8' stroke-linecap='round' stroke-linejoin='round' stroke-width='1.5' d='M6 8l4 4 4-4'/%3e%3c/svg%3e");
        background-position: right 10px center;
        background-repeat: no-repeat;
        background-size: 18px;
        padding-right: 36px;
      }

      .button-row {
        display: flex;
        gap: 8px;
        margin-top: 24px;
      }
      button {
        border: 1px solid transparent;
        border-radius: 10px;
        padding: 10px 20px;
        font: inherit;
        font-size: 13px;
        font-weight: 600;
        cursor: pointer;
        transition: all 160ms cubic-bezier(0.16, 1, 0.3, 1);
        line-height: 1.25;
      }
      button:hover { transform: scale(1.015); }
      button:active { transform: scale(0.97); }
      button.primary {
        background: linear-gradient(135deg, #4f46e5, #4338ca);
        color: #fff;
        box-shadow: 0 1px 3px rgba(79, 70, 229, 0.25);
      }
      button.primary:hover {
        box-shadow: 0 4px 14px rgba(79, 70, 229, 0.28);
      }
      button.secondary {
        background: var(--surface);
        color: #334155;
        border-color: rgba(203, 213, 225, 0.9);
        box-shadow: 0 1px 2px rgba(15, 23, 42, 0.04);
      }
      button.secondary:hover {
        background: #f8fafc;
        border-color: rgba(148, 163, 184, 0.7);
      }

      #status {
        margin-top: 16px;
        padding: 9px 14px;
        border-radius: 10px;
        background: linear-gradient(180deg, #f8fafc, #f1f5f9);
        border: 1px solid var(--line);
        font-size: 12.5px;
        font-weight: 500;
        color: var(--muted);
        display: flex;
        align-items: center;
        gap: 8px;
      }
      #status::before {
        content: '';
        width: 6px;
        height: 6px;
        border-radius: 50%;
        background: var(--faint);
        flex-shrink: 0;
      }
      #status[data-error="true"] {
        color: var(--danger);
        border-color: rgba(220, 38, 38, 0.2);
        background: linear-gradient(180deg, #fef2f2, #fee2e2);
      }
      #status[data-error="true"]::before {
        background: var(--danger);
      }

      @keyframes fade-up {
        from { opacity: 0; transform: translateY(8px); }
        to   { opacity: 1; transform: translateY(0); }
      }
    </style>
  </head>
  <body>
    <main>
      <section class="card">
        <div class="card-header">
          <span class="card-icon">&#x2699;&#xFE0F;</span>
          <div>
            <h1>Babel Review Settings</h1>
            <p class="card-desc">Configure the review workflow and backend endpoints.</p>
          </div>
        </div>

        <div class="field-group">
          <label for="workflowMode">Default Workflow</label>
          <select id="workflowMode">
            <option value="interactive">Interactive review session</option>
            <option value="fast">Fast route</option>
          </select>
        </div>

        <div class="field-group">
          <label for="backendBaseUrl">Primary Backend URL</label>
          <input id="backendBaseUrl" type="url" placeholder="https://reviewgen.ovh" />
        </div>

        <div class="field-group">
          <label for="backendFallbacks">Fallback Backend URLs</label>
          <textarea id="backendFallbacks" placeholder="One URL per line"></textarea>
        </div>

        <div class="field-group">
          <label for="refreshTimeoutMs">Refresh Timeout (ms)</label>
          <input id="refreshTimeoutMs" type="number" min="1000" step="500" />
        </div>

        <div class="button-row">
          <button class="primary" id="saveBtn" type="button">Save</button>
          <button class="secondary" id="resetBtn" type="button">Reset defaults</button>
        </div>

        <div id="status">Loading...</div>
      </section>
    </main>
    <script src="dist/options/entry.js"></script>
  </body>
</html>
